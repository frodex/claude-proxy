port: 3100
host: 0.0.0.0

# HTTP + WebSocket API (browser, OAuth). Omit `port` when socket-only + `public_base_url` for OAuth.
api:
  port: 3101
  host: 127.0.0.1
  # Unix socket JSON-RPC (svg-terminal, local integrations)
  socket: /run/claude-proxy/api.sock
  socket_mode: 432 # octal 0660 (rw-rw----)

auth:
  authorized_keys: ~/.ssh/authorized_keys
  # OAuth providers (uncomment and configure to enable web auth)
  # providers:
  #   google:
  #     client_id: "xxx.apps.googleusercontent.com"
  #     client_secret: "xxx"
  #   microsoft:
  #     client_id: "xxx"
  #     client_secret: "xxx"
  #     tenant: "common"
  #   github:
  #     client_id: "xxx"
  #     client_secret: "xxx"
  # session:
  #   secret: "change-me-to-a-random-string"
  #   max_age: 86400

sessions:
  default_user: root
  scrollback_bytes: 1048576
  max_sessions: 50
  allow_suspend: false    # allow Ctrl+Z to suspend Claude (power user mode)

lobby:
  motd: "Welcome to claude-proxy"

remotes:
  - name: bigserver
    host: bigserver
  - name: cloudflare-droid
    host: cloudflare-droid
  - name: ct100
    host: ct100
