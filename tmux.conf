# claude-proxy tmux config
# Remap prefix to Ctrl+Q so Ctrl+B is free for the proxy
set -g prefix C-q
unbind C-b
bind C-q send-prefix

# Disable tmux status bar (proxy handles its own status via title bar)
set -g status off

# Don't interfere with mouse
set -g mouse off

# Large scrollback (tmux-side, in addition to proxy's xterm buffer)
set -g history-limit 50000

# Pass through all keys
set -g escape-time 0
